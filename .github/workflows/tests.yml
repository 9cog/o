name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            cmake \
            guile-3.0-dev \
            libgmp-dev \
            cxxtest \
            python3-dev \
            cython3 \
            python3-pytest \
            libssl-dev \
            librocksdb-dev

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -- -j$(nproc)

      - name: Build tests
        run: cmake --build build --target tests -- -j$(nproc)

      - name: Run unit tests
        working-directory: build
        run: ctest --output-on-failure --timeout 120

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/Testing/
          retention-days: 7
